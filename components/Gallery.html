<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ─── Section ─── */
  .gallery-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 2.5rem 1.5rem 2.5rem;
    background: #000;
    min-height: 100dvh;
  }

  /* ─── Top bar ─── */
  .top-bar {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .active-label {
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ─── Categories button + dropdown ─── */
  .drop-wrap { position: relative; }

  .cat-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 1rem;
    border: 1px solid #2a2a2a;
    border-radius: 999px;
    background: transparent;
    color: #888;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    font-family: inherit;
    white-space: nowrap;
    position: relative;
    text-transform: uppercase;
  }
  .cat-btn:hover { border-color: #444; color: #aaa; }
  .cat-btn.open { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }

  .cat-badge {
    position: absolute;
    top: -5px; right: -5px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff; color: #000;
    font-size: 0.5rem; font-weight: 700;
    display: none; align-items: center; justify-content: center;
  }
  .cat-badge.visible { display: flex; }

  .dropdown {
    position: absolute;
    top: calc(100% + 8px); right: 0;
    min-width: 190px;
    background: #0e0e0e;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 6px;
    z-index: 100;
    display: none;
    animation: dropIn 180ms cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  .dropdown.open { display: block; }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .drop-item {
    width: 100%;
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    border: none; background: transparent;
    color: #666;
    font-size: 0.62rem; letter-spacing: 0.12em;
    cursor: pointer; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    font-family: inherit; text-align: left; text-transform: uppercase;
  }
  .drop-item:hover { background: rgba(255,255,255,0.05); color: #ccc; }
  .drop-item.active { color: #fff; }
  .drop-icon { font-size: 0.6rem; width: 14px; text-align: center; flex-shrink: 0; }
  .drop-check { margin-left: auto; font-size: 0.6rem; color: #fff; opacity: 0.8; display: none; }
  .drop-item.active .drop-check { display: block; }
  .drop-divider { height: 1px; background: #1e1e1e; margin: 4px 6px; }

  /* ─── 3D Stage ─── */
  .stage {
    width: 100%;
    max-width: 860px;
    min-height: 420px;
    padding: 30px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    touch-action: pan-y;
    position: relative;
    user-select: none;
  }
  .stage:active { cursor: grabbing; }

  .scene {
    width: 240px; height: 380px;
    perspective: 1200px;
    position: relative;
  }

  .carousel {
    width: 100%; height: 100%;
    position: absolute;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
    transition: transform 700ms cubic-bezier(0.25,0.46,0.45,0.94);
    will-change: transform;
  }
  .carousel.dragging { transition: none; }

  /* ─── Card ─── */
  .card {
    position: absolute;
    width: 220px; height: 360px;
    left: 10px; top: 10px;
    border-radius: 16px;
    overflow: hidden;
    backface-visibility: hidden;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }

  /* ─── Image strip ─── */
  .image-strip {
    flex: 1;
    display: flex;
    overflow-x: scroll;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    cursor: grab;
    scrollbar-width: none;
    -ms-overflow-style: none;
    position: relative;
  }
  .image-strip::-webkit-scrollbar { display: none; }
  .image-strip:active { cursor: grabbing; }

  .strip-img {
    flex: 0 0 100%;
    width: 100%; height: 100%;
    object-fit: cover;
    scroll-snap-align: start;
    pointer-events: none;
    user-select: none;
    display: block;
    filter: brightness(0.45) saturate(0.85);
    transition: filter 0.45s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  .card:hover .strip-img {
    filter: brightness(1.1) saturate(1.3);
    transform: scale(1.04);
  }

  /* ─── Card overlay ─── */
  .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px 14px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.0) 55%);
    transition: background 0.4s ease;
    pointer-events: none;
    z-index: 2;
  }
  .card:hover .card-overlay {
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.08) 65%);
  }

  .card-category {
    display: block;
    font-size: 8px;
    letter-spacing: 0.16em;
    margin-bottom: 3px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease 0.05s, transform 0.3s ease 0.05s;
  }
  .card:hover .card-category { opacity: 1; transform: translateY(0); }

  .card-title {
    font-size: 13px; font-weight: 600; color: #fff;
    margin: 0 0 2px; line-height: 1.3;
    transition: transform 0.3s ease;
  }
  .card:hover .card-title { transform: translateY(-2px); }

  .card-sub {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    margin: 0;
  }

  .card-cta {
    font-size: 8px;
    color: rgba(255,255,255,0.45);
    margin-top: 5px;
    opacity: 0;
    transform: translateX(-3px);
    transition: opacity 0.25s ease 0.07s, transform 0.25s ease 0.07s, color 0.2s;
  }
  .card:hover .card-cta { opacity: 1; transform: translateX(0); color: rgba(255,255,255,0.75); }

  /* ─── Info panel ─── */
  .info-panel {
    margin-top: 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    min-height: 52px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .info-panel.visible { opacity: 1; transform: translateY(0); }

  .info-cat {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .info-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
  }

  .info-sub {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
  }

  /* ─── Dots ─── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1rem;
  }

  .dots { display: flex; gap: 6px; align-items: center; }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: none; cursor: pointer; padding: 0;
    transition: background 0.25s, transform 0.25s;
  }
  .dot.active { transform: scale(1.5); }

  .drag-hint {
    font-size: 0.58rem;
    letter-spacing: 0.24em;
    color: rgba(255,255,255,0.45);
    margin-top: 1rem;
    text-transform: uppercase;
  }

  /* ════ MODAL ════ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(24px) saturate(1.6);
    -webkit-backdrop-filter: blur(24px) saturate(1.6);
    padding: 1.5rem;
    animation: backdropIn 0.4s ease forwards;
  }
  .modal-backdrop.open { display: flex; }

  @keyframes backdropIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal {
    position: relative;
    background: rgba(255,255,255,0.065);
    backdrop-filter: blur(40px) saturate(1.5) brightness(1.9);
    -webkit-backdrop-filter: blur(40px) saturate(1.5) brightness(1.9);
    border-top: 1px solid rgba(255,255,255,0.42);
    border-left: 1px solid rgba(255,255,255,0.16);
    border-right: 1px solid rgba(255,255,255,0.10);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    overflow: hidden;
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.14),
      0 4px 24px rgba(0,0,0,0.35),
      0 32px 80px rgba(0,0,0,0.55),
      inset 0 1.5px 0 rgba(255,255,255,0.32),
      inset 0 -1px 0 rgba(255,255,255,0.06);
    animation: modalIn 0.52s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.88) translateY(32px); filter: blur(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  .close-btn {
    position: absolute;
    top: 14px; right: 14px;
    z-index: 10;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.22);
    border-top-color: rgba(255,255,255,0.38);
    color: rgba(255,255,255,0.8);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.3);
    transition: background 0.2s, color 0.2s, transform 0.2s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.18); color: #fff; transform: rotate(90deg); }

  .modal-img-wrap {
    width: 100%;
    padding: 1rem 1rem 0;
  }

  .modal-img-strip {
    display: flex;
    overflow-x: scroll;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-radius: 10px;
    cursor: grab;
    user-select: none;
  }
  .modal-img-strip::-webkit-scrollbar { display: none; }
  .modal-img-strip:active { cursor: grabbing; }

  .modal-img {
    flex: 0 0 100%;
    width: 100%;
    height: auto;
    max-height: 52vh;
    object-fit: cover;
    scroll-snap-align: start;
    display: block;
    pointer-events: none;
  }

  .modal-info {
    padding: 1.25rem 1.75rem 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    border-top: 0.5px solid rgba(255,255,255,0.1);
    overflow-y: auto;
  }

  .modal-category {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: monospace;
  }

  .modal-title {
    font-size: 1.55rem;
    color: #fff;
    font-weight: 700;
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
  }

  .modal-sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
  }

  .modal-desc {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.62);
    line-height: 1.65;
    margin-top: 0.25rem;
    font-weight: 300;
  }

  .modal-swipe-hint {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.18);
    margin-top: 0.25rem;
    text-transform: uppercase;
  }

  /* ─── Mobile ─── */
  @media (max-width: 680px) {
    .modal-backdrop { padding: 0; align-items: flex-end; }
    .modal {
      max-width: 100%;
      border-radius: 24px 24px 0 0;
      border-bottom: none;
      max-height: 92dvh;
      overflow-y: auto;
    }
    .modal::before {
      content: "";
      display: block;
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.28);
      border-radius: 2px;
      margin: 10px auto 0;
    }
    .modal-title { font-size: 1.3rem; }
    .modal-info { padding: 1.25rem 1.25rem 2rem; }
  }
</style>
</head>
<body>

<section class="gallery-section">
  <!-- Top bar -->
  <div class="top-bar">
    <span class="active-label" id="activeLabel">ALL WORK</span>
    <div class="drop-wrap" id="dropWrap">
      <button class="cat-btn" id="catBtn">
        <span>⊞</span>
        CATEGORIES
        <span id="catChevron">▼</span>
        <span class="cat-badge" id="catBadge">0</span>
      </button>
      <div class="dropdown" id="dropdown">
        <button class="drop-item active" data-cat="ALL">
          <span class="drop-icon">✦</span>ALL
          <span class="drop-check">✓</span>
        </button>
        <div class="drop-divider"></div>
        <button class="drop-item" data-cat="BRANDING">
          <span class="drop-icon">◈</span>BRANDING
          <span class="drop-check">✓</span>
        </button>
        <button class="drop-item" data-cat="UI/UX DESIGN">
          <span class="drop-icon">⊡</span>UI/UX DESIGN
          <span class="drop-check">✓</span>
        </button>
        <button class="drop-item" data-cat="WEB DESIGN">
          <span class="drop-icon">⊕</span>WEB DESIGN
          <span class="drop-check">✓</span>
        </button>
        <button class="drop-item" data-cat="MOTION DESIGN">
          <span class="drop-icon">▷</span>MOTION DESIGN
          <span class="drop-check">✓</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 3D Stage -->
  <div class="stage" id="stage">
    <div class="scene">
      <div class="carousel" id="carousel"></div>
    </div>
  </div>

  <!-- Info panel -->
  <div class="info-panel" id="infoPanel">
    <span class="info-cat" id="infoCat"></span>
    <span class="info-title" id="infoTitle"></span>
    <span class="info-sub" id="infoSub"></span>
  </div>

  <!-- Dots -->
  <div class="controls">
    <div class="dots" id="dots"></div>
  </div>

  <p class="drag-hint">DRAG TO EXPLORE · CLICK TO OPEN</p>
</section>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="modal-img-wrap">
      <div class="modal-img-strip" id="modalImgStrip"></div>
    </div>
    <div class="modal-info">
      <span class="modal-category" id="modalCategory"></span>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-sub" id="modalSub"></p>
      <p class="modal-desc" id="modalDesc"></p>
      <p class="modal-swipe-hint" id="modalSwipeHint"></p>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const CATEGORY_ICONS = {

const RADIUS = 360;

// ── State ─────────────────────────────────────────────────────────────────────
let selectedCats = new Set();
let currentIndex = 0;
let filtered = [...PROJECTS];
let angleVar = 0;
let targetAngle = 0;
let isDragging = false;
let startX = 0;
let startAngle = 0;
let isHovering = false;
let autoTimer = null;
let infoTimer = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const carousel    = document.getElementById('carousel');
const stage       = document.getElementById('stage');
const dotsEl      = document.getElementById('dots');
const infoPanel   = document.getElementById('infoPanel');
const infoCat     = document.getElementById('infoCat');
const infoTitle   = document.getElementById('infoTitle');
const infoSub     = document.getElementById('infoSub');
const activeLabel = document.getElementById('activeLabel');
const catBtn      = document.getElementById('catBtn');
const catChevron  = document.getElementById('catChevron');
const catBadge    = document.getElementById('catBadge');
const dropdown    = document.getElementById('dropdown');
const dropWrap    = document.getElementById('dropWrap');

// Modal
const modalBackdrop  = document.getElementById('modalBackdrop');
const modalImgStrip  = document.getElementById('modalImgStrip');
const modalCategory  = document.getElementById('modalCategory');
const modalTitle     = document.getElementById('modalTitle');
const modalSub       = document.getElementById('modalSub');
const modalDesc      = document.getElementById('modalDesc');
const modalSwipeHint = document.getElementById('modalSwipeHint');
document.getElementById('closeBtn').addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });

// ── Helpers ───────────────────────────────────────────────────────────────────
function setAngle(deg) {
  angleVar = deg;
  carousel.style.transform = `rotateY(${deg}deg)`;
}

function getStepAngle() {
  return filtered.length > 0 ? 360 / filtered.length : 360;
}

function snapTo(raw) {
  const step = getStepAngle();
  const N = filtered.length;
  if (N === 0) return;
  const snapped = Math.round(-raw / step);
  const idx = ((snapped % N) + N) % N;
  const snappedAngle = -idx * step;
  currentIndex = idx;
  targetAngle = snappedAngle;
  setAngle(snappedAngle);
  updateInfoPanel();
  updateDots();
}

function goTo(i) {
  const N = filtered.length;
  if (N === 0) return;
  const idx = ((i % N) + N) % N;
  const step = getStepAngle();
  const newAngle = -idx * step;
  currentIndex = idx;
  targetAngle = newAngle;
  setAngle(newAngle);
  updateInfoPanel();
  updateDots();
  resetAuto();
}

function updateInfoPanel() {
  const p = filtered[currentIndex];
  if (!p) return;
  infoPanel.classList.remove('visible');
  clearTimeout(infoTimer);
  infoTimer = setTimeout(() => {
    infoCat.textContent = `${CATEGORY_ICONS[p.category]} ${p.category}`;
    infoCat.style.color = p.accent;
    infoTitle.textContent = p.title;
    infoSub.textContent = p.sub;
    infoPanel.classList.add('visible');
  }, 180);
}

function updateDots() {
  const dots = dotsEl.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.classList.toggle('active', i === currentIndex);
    d.style.background = i === currentIndex && filtered[i]
      ? filtered[i].accent
      : 'rgba(255,255,255,0.2)';
  });
}

// ── Build carousel ────────────────────────────────────────────────────────────
function buildCarousel() {
  carousel.innerHTML = '';
  dotsEl.innerHTML = '';
  const step = getStepAngle();

  filtered.forEach((project, i) => {
    // Card
    const card = document.createElement('div');
    card.className = 'card';
    card.style.transform = `rotateY(${i * step}deg) translateZ(${RADIUS}px)`;
    card.style.background = project.bg;
    card.style.borderColor = project.accent + '33';

    // Image strip
    const strip = document.createElement('div');
    strip.className = 'image-strip';

    project.images.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = project.title;
      img.className = 'strip-img';
      img.draggable = false;
      strip.appendChild(img);
    });

    // Card image drag (separate from carousel drag)
    let imgDragging = false, imgStartX = 0, imgScrollStart = 0, hasDragged = false;
    strip.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      imgDragging = true;
      hasDragged = false;
      imgStartX = e.clientX;
      imgScrollStart = strip.scrollLeft;
    });

    // Overlay
    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';

    const catSpan = document.createElement('span');
    catSpan.className = 'card-category';
    catSpan.style.color = project.accent;
    catSpan.textContent = `${CATEGORY_ICONS[project.category]} ${project.category}`;

    const titleP = document.createElement('p');
    titleP.className = 'card-title';
    titleP.textContent = project.title;

    const subP = document.createElement('p');
    subP.className = 'card-sub';
    subP.textContent = project.sub;

    const cta = document.createElement('span');
    cta.className = 'card-cta';
    cta.textContent = 'Open →';

    overlay.appendChild(catSpan);
    overlay.appendChild(titleP);
    overlay.appendChild(subP);
    overlay.appendChild(cta);

    card.appendChild(strip);
    card.appendChild(overlay);

    // Click to open
    let cardHasDragged = false;
    card.addEventListener('mousedown', () => { cardHasDragged = false; });
    card.addEventListener('mousemove', () => { cardHasDragged = true; });
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!cardHasDragged) openModal(project);
    });

    carousel.appendChild(card);

    // Dot
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentIndex ? ' active' : '');
    dot.setAttribute('aria-label', `Project ${i + 1}`);
    if (i === currentIndex) dot.style.background = project.accent;
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);

    // Card image dragging (global move/up on window)
    window._stripHandlers = window._stripHandlers || [];
    const moveH = (e) => {
      if (!imgDragging) return;
      const dx = e.clientX - imgStartX;
      if (Math.abs(dx) > 4) hasDragged = true;
      strip.scrollLeft = imgScrollStart - dx;
    };
    const upH = () => { imgDragging = false; };
    window.addEventListener('mousemove', moveH);
    window.addEventListener('mouseup', upH);
  });

  setAngle(-currentIndex * step);
  updateDots();
  updateInfoPanel();
}

// ── Auto-rotate ───────────────────────────────────────────────────────────────
function startAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    if (!isDragging && !isHovering && !modalBackdrop.classList.contains('open')) {
      const N = filtered.length;
      if (N === 0) return;
      currentIndex = (currentIndex + 1) % N;
      targetAngle = -currentIndex * getStepAngle();
      setAngle(targetAngle);
      updateInfoPanel();
      updateDots();
    }
  }, 3500);
}

function resetAuto() {
  if (autoTimer) clearInterval(autoTimer);
  startAuto();
}

// ── Stage drag (carousel rotation) ───────────────────────────────────────────
stage.addEventListener('mouseenter', () => { isHovering = true; });
stage.addEventListener('mouseleave', () => { isHovering = false; });

stage.addEventListener('mousedown', (e) => {
  if (e.target.closest('.card') || e.target.closest('button')) return;
  isDragging = true;
  startX = e.clientX;
  startAngle = targetAngle;
  carousel.classList.add('dragging');
});

stage.addEventListener('touchstart', (e) => {
  isDragging = true;
  startX = e.touches[0].clientX;
  startAngle = targetAngle;
  carousel.classList.add('dragging');
}, { passive: true });

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const liveAngle = startAngle + (e.clientX - startX) * 0.4;
  targetAngle = liveAngle;
  setAngle(liveAngle);
});

window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  carousel.classList.remove('dragging');
  snapTo(targetAngle);
});

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const liveAngle = startAngle + (e.touches[0].clientX - startX) * 0.4;
  targetAngle = liveAngle;
  setAngle(liveAngle);
}, { passive: true });

window.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  carousel.classList.remove('dragging');
  snapTo(targetAngle);
});

// ── Dropdown ──────────────────────────────────────────────────────────────────
catBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const open = dropdown.classList.toggle('open');
  catBtn.classList.toggle('open', open);
  catChevron.textContent = open ? '▲' : '▼';
});

document.addEventListener('mousedown', (e) => {
  if (!dropWrap.contains(e.target)) {
    dropdown.classList.remove('open');
    catBtn.classList.remove('open');
    catChevron.textContent = '▼';
  }
});

dropdown.querySelectorAll('.drop-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (cat === 'ALL') {
      selectedCats.clear();
      dropdown.querySelectorAll('.drop-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      // Deactivate ALL
      dropdown.querySelector('[data-cat="ALL"]').classList.remove('active');
      if (selectedCats.has(cat)) {
        selectedCats.delete(cat);
        btn.classList.remove('active');
        if (selectedCats.size === 0) {
          dropdown.querySelector('[data-cat="ALL"]').classList.add('active');
        }
      } else {
        selectedCats.add(cat);
        btn.classList.add('active');
      }
    }

    // Update badge
    const count = selectedCats.size;
    catBadge.textContent = count;
    catBadge.classList.toggle('visible', count > 0);

    // Update label
    activeLabel.textContent = count === 0
      ? 'ALL WORK'
      : Array.from(selectedCats).join(' · ');

    // Rebuild
    filtered = count === 0
      ? [...PROJECTS]
      : PROJECTS.filter(p => selectedCats.has(p.category));

    currentIndex = 0;
    targetAngle = 0;
    buildCarousel();
    resetAuto();

    // Close dropdown
    dropdown.classList.remove('open');
    catBtn.classList.remove('open');
    catChevron.textContent = '▼';
  });
});

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(project) {
  modalImgStrip.innerHTML = '';
  project.images.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = project.title;
    img.className = 'modal-img';
    img.draggable = false;
    modalImgStrip.appendChild(img);
  });

  modalCategory.textContent = `${CATEGORY_ICONS[project.category]} ${project.category}`;
  modalCategory.style.color = project.accent;
  modalTitle.textContent = project.title;
  modalSub.textContent = project.sub;
  modalDesc.textContent = project.description || '';
  modalSwipeHint.textContent = project.images.length > 1 ? '← swipe to explore more →' : '';

  modalBackdrop.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Modal strip drag
  let mDrag = false, mStartX = 0, mScrollStart = 0;
  modalImgStrip.addEventListener('mousedown', (e) => {
    mDrag = true;
    mStartX = e.clientX;
    mScrollStart = modalImgStrip.scrollLeft;
  });
  const mMove = (e) => { if (mDrag) modalImgStrip.scrollLeft = mScrollStart - (e.clientX - mStartX); };
  const mUp   = () => { mDrag = false; };
  window.addEventListener('mousemove', mMove);
  window.addEventListener('mouseup', mUp);
  modalBackdrop._cleanup = () => {
    window.removeEventListener('mousemove', mMove);
    window.removeEventListener('mouseup', mUp);
  };
}

function closeModal() {
  modalBackdrop.classList.remove('open');
  document.body.style.overflow = '';
  if (modalBackdrop._cleanup) { modalBackdrop._cleanup(); modalBackdrop._cleanup = null; }
}

window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────────────────
buildCarousel();
startAuto();
</script>
</body>
</html>
